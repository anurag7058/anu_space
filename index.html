<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyShop — Shop Bold</title>
  <link rel="stylesheet" href="style.css">
</head>

<header>
  <div class="logo" onclick="showPage('home')">MY<span>SHOP</span></div>
  <nav>
    <a onclick="showPage('home')">Home</a>
    <a onclick="showPage('explore')">Shop</a>
    <a onclick="showPage('wishlist')">Wishlist <span id="wish-count">0</span></a>
    <a onclick="showPage('orders')">Orders</a>
    <a id="auth-link" onclick="showPage('login')">Login</a>
    <button onclick="toggleCart()">🛒 <span id="cart-count">0</span></button>
  </nav>
</header>

<section id="home" class="page"></section>

<section id="explore" class="page hidden">
  <input type="text" id="search" placeholder="Search..." oninput="searchProducts()">
  <div id="product-list"></div>
</section>

<section id="wishlist" class="page hidden">
  <div id="wishlist-list"></div>
</section>

<section id="orders" class="page hidden">
  <div id="order-list"></div>
</section>

<section id="login" class="page hidden">
  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>
</section>

<!-- PAYMENT -->
<section id="payment" class="page hidden">
  <h2>Checkout</h2>
  <div id="order-summary-list"></div>
  <div>Total: ₹<span id="payment-amount">0</span></div>

  <h3>Payment Method</h3>
  <label><input type="radio" name="payment" value="cod" checked> COD</label>
  <label><input type="radio" name="payment" value="upi"> UPI</label>

  <div id="upi-box" class="hidden">
    <input type="text" id="upi-id" placeholder="Enter UPI ID">
  </div>

  <button onclick="confirmPayment()">Pay Now</button>
</section>

<script src="script.js"></script>
</body>
</html>
